<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=2" />
  <meta name="description" content="Description" />
  <meta name="keywords" content="Keywords" />
  <title>QR Scout</title>

  <link rel="manifest" href="/QRScout/manifest.json" />
  <link href="/QRScout/icons/favicon-16x16.png" rel="icon" type="image/png" sizes="16x16" />
  <link href="/QRScout/icons/favicon-32x32.png" rel="icon" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/QRScout/apple-icon.png" />
  <meta name="theme-color" content="#317EFB" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

<button onclick="openConfirm()" style="padding:8px 16px; border:none; border-radius:6px; background:#e74c3c; color:white; cursor:pointer;">
  Reset App
</button>

<!-- Modal -->
<div id="confirmBox" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
">

  <div style="
    background:white;
    color:black;
    padding:20px;
    width:300px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
  ">
    <h3 style="margin-top:0;">Reset App</h3>
    <p style="font-size:14px;">Type <b>confirm</b> to continue</p>

    <input id="confirmInput" type="text" placeholder="confirm"
      style="width:100%; padding:8px; margin-top:10px; border:1px solid #ccc; border-radius:6px;" />

    <div style="margin-top:15px;">
      <button onclick="doReset()" 
        style="padding:8px 12px; border:none; border-radius:6px; background:#463be7; color:white; cursor:pointer;">
        OK
      </button>

      <button onclick="closeConfirm()" 
        style="padding:8px 12px; border:none; border-radius:6px; background:#ccc; margin-left:10px; cursor:pointer;">
        Cancel
      </button>
    </div>
  </div>

</div>

<script>
function openConfirm() {
  document.getElementById("confirmBox").style.display = "flex";
}

function closeConfirm() {
  document.getElementById("confirmBox").style.display = "none";
}

function doReset() {
  const input = document.getElementById("confirmInput").value.trim().toLowerCase();

  if (input !== "confirm") {
    alert("You must type 'confirm'");
    return;
  }

  localStorage.clear();
  sessionStorage.clear();

  document.cookie.split(";").forEach(function(cookie) {
    document.cookie = cookie
      .replace(/^ +/, "")
      .replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");
  });

  if ('caches' in window) {
    caches.keys().then(names => {
      names.forEach(name => caches.delete(name));
    });
  }

  location.reload();
}
</script>
</html>
